<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сеть ПРИВІД</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 2px dashed #238636; padding: 20px; border-radius: 10px; display: inline-block; background: #161b22; }
        h1 { color: #238636; text-shadow: 0 0 10px #238636; }
        .btn { background: #238636; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-family: monospace; }
        .btn:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🕵️‍♂️ СЕТЬ «ПРИВІД» v2.0</h1>
        <p>Добро пожаловать в цифровой терминал управления.</p>
        <hr style="border-color: #21262d;">
        <p>Статус подключения: <span style="color:#2ea043">ЗАЩИЩЕНО</span></p>
        <p>Баланс сети: <b>5,400 ₴</b></p>
        <p>Агенты на связи: <b>14</b></p>
        <br>
        <button class="btn" onclick="alert('Сигнал отправлен на радар Агентов!')">🎯 РАДАР КОНТРАКТОВ</button>
    </div>
</body>
</html>
