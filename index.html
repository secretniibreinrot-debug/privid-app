<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сеть ПРИВІД</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: monospace; text-align: center; padding: 40px; }
        .box { border: 2px dashed #238636; padding: 30px; border-radius: 10px; display: inline-block; background: #161b22; box-shadow: 0 0 15px rgba(35,134,54,0.5); }
        h1 { color: #238636; text-shadow: 0 0 10px #238636; }
        .btn { background: #238636; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; font-family: monospace; font-weight: bold; }
        .btn:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🕵️‍♂️ СЕТЬ «ПРИВІД» 2.0</h1>
        <p>Добро пожаловать в личный терминал управления, Шеф.</p>
        <hr style="border-color: #21262d;">
        <p>Статус: <span style="color:#2ea043; font-weight: bold;">ГЛАВНЫЙ СЕРВЕР АКТИВЕН</span></p>
        <p>Баланс сети: <b>10,500 ₴</b></p>
        <br>
        <button class="btn" onclick="alert('Запрос отправлен! Агенты на радаре получили сигнал.')">🎯 РАДАР КОНТРАКТОВ</button>
    </div>
</body>
</html>
