<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРИВІД ТЕРМІНАЛ</title>
    <style>
        :root {
            --bg-body: #0d1117;
            --bg-box: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --card-bg: #21262d;
            --font-size-base: 14px;
        }
        .light-theme {
            --bg-body: #f0f2f5;
            --bg-box: #ffffff;
            --border-color: #d0d7de;
            --text-color: #24292f;
            --accent-color: #0969da;
            --card-bg: #f6f8fa;
        }

        .font-small { --font-size-base: 11px; }
        .font-medium { --font-size-base: 14px; }
        .font-large { --font-size-base: 18px; }

        body { background: var(--bg-body); color: var(--text-color); font-family: monospace; padding: 10px; text-align: center; margin: 0; transition: 0.2s; font-size: var(--font-size-base); }
        .box { border: 2px solid var(--border-color); padding: 15px; border-radius: 10px; background: var(--bg-box); max-width: 480px; margin: 10px auto; min-height: 92vh; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        
        .main-title { font-size: calc(var(--font-size-base) * 1.8); font-weight: 900; color: var(--accent-color); text-transform: uppercase; margin: 15px 0; }
        
        .btn-mid { background: var(--card-bg); color: var(--text-color); border: 2px solid var(--border-color); padding: 12px 20px; font-size: calc(var(--font-size-base) * 0.9); font-weight: bold; border-radius: 6px; cursor: pointer; width: 80%; margin: 10px auto; display: block; font-family: monospace; }
        .btn-mid.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        
        .btn-action { background: #238636; color: white; border: none; padding: 10px 15px; font-size: calc(var(--font-size-base) * 0.9); font-weight: bold; border-radius: 5px; cursor: pointer; width: 85%; margin: 8px 0; font-family: monospace; }
        .btn-action:hover { background: #2ea043; }
        .btn-danger { background: #da3637; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-family: monospace; font-weight: bold; }

        .nav-menu { display: flex; justify-content: space-around; background: var(--card-bg); padding: 8px; border-radius: 5px; margin-bottom: 12px; border: 1px solid var(--border-color); flex-wrap: wrap; gap: 5px; }
        .nav-item { color: #8b949e; cursor: pointer; font-weight: bold; font-size: calc(var(--font-size-base) * 0.75); text-transform: uppercase; padding: 4px 6px; }
        .nav-item.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }
        
        input, select, textarea { background: var(--bg-body); color: var(--accent-color); border: 1px solid var(--border-color); padding: 8px; border-radius: 5px; width: 80%; margin: 5px 0; font-family: monospace; text-align: center; font-size: calc(var(--font-size-base) * 0.9); }
        .hidden { display: none !important; }
        .screen { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; width: 100%; }
        .card { border: 1px solid var(--border-color); padding: 12px; margin: 6px 0; border-radius: 5px; background: var(--card-bg); text-align: left; width: 95%; box-sizing: border-box; }
        
        .scroll-container { width: 100%; max-height: 320px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 5px; background: rgba(0,0,0,0.2); padding: 5px; box-sizing: border-box; }
        .top-item { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 95%; margin-top: 10px; }
        .game-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; color: var(--accent-color); text-align: center; font-size: 12px; }
        
        #black-field { width: 95%; height: 180px; background: #000000; border: 2px solid #30363d; position: relative; margin-top: 10px; cursor: crosshair; border-radius: 5px; }
        #red-target { width: 30px; height: 30px; background: #da3637; border-radius: 50%; position: absolute; top: 70px; left: 100px; }
        #flappy-canvas { background: #70c5ce; display: block; margin: 10px auto; border: 2px solid var(--border-color); border-radius: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <div id="auth-screen" class="screen">
            <div class="main-title">ПРИВІД СИСТЕМА</div>
            <p style="color: #8b949e; font-size: 11px; margin-bottom: 20px;">🔒 Дані сесії зачищаються при кожному виході</p>
            
            <button id="btn-mode-login" class="btn-mid active" onclick="selectAuthMode('login')">ВХІД</button>
            <button id="btn-mode-register" class="btn-mid" onclick="selectAuthMode('register')">РЕЄСТРАЦІЯ</button>

            <div id="panel-login" style="width: 100%;">
                <input type="text" id="login-username" placeholder="Ваш Нікнейм...">
                <input type="password" id="login-password" placeholder="Ваш Пароль...">
                <button class="btn-action" onclick="actionLogin()">УВІЙТИ</button>
            </div>

            <div id="panel-register" class="hidden" style="width: 100%;">
                <input type="text" id="reg-username" placeholder="Придумайте Нікнейм...">
                <input type="password" id="reg-password" placeholder="Придумайте Пароль...">
                <input type="text" id="reg-code" placeholder="Код доступу (опціонально)...">
                <button class="btn-action" style="background:#1f6feb;" onclick="actionRegister()">СТВОРЕННЯ АКАУНТУ</button>
            </div>
        </div>

        <div id="main-interface" class="screen hidden">
            <div style="width: 100%;">
                <h3 style="margin: 5px 0; color: var(--accent-color);">ТЕРМІНАЛ ПРИВІД</h3>
                <p style="font-size: 11px; color: #8b949e; margin: 2px 0;">
                    Агент: <span id="lbl-nick" style="color:#79c0ff; font-weight:bold;"></span> | 
                    Роль: <span id="lbl-role" style="color:#f9c74f;"></span> | 
                    Баланс: <span id="lbl-bal" style="color:#2ea043; font-weight:bold;"></span> ₴
                </p>
                
                <div class="nav-menu">
                    <div class="nav-item active" id="tab-home" onclick="switchTab('home')">ТОП 100</div>
                    <div class="nav-item" id="tab-orders" onclick="switchTab('orders')">Замовити</div>
                    <div class="nav-item" id="tab-games" onclick="switchTab('games')">Ігри</div>
                    <div class="nav-item" id="tab-ghost" onclick="switchTab('ghost')">Стрічка Завдань</div>
                    <div id="nav-admin" class="nav-item hidden" style="color:#ca6702;" onclick="switchTab('admin')">⚙️ Керування</div>
                    <div class="nav-item" id="tab-settings" onclick="switchTab('settings')">Опції</div>
                </div>
            </div>

            <div id="view-home" class="screen-view" style="width: 100%;">
                <h3>📊 РЕЙТИНГ АГЕНТІВ (МІСЦЬ: 1-100)</h3>
                <div class="scroll-container" id="top-100-container"></div>
            </div>
